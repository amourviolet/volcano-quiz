<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>火山为什么会喷发？</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 标题和火山图 -->
  <section id="home">
    <h1 id="title">🌋 火山为什么会喷发？🌋</h1>

    <!-- 火山图形 -->
    <div class="cute-volcano">
      <div class="lava-top"></div>
      <div class="volcano-body"></div>
    </div>
  </section>

  <!-- 题目区 -->
  <section class="question-section">

    <div class="question-block">
      <div class="question-text">1. 火山口为什么会喷出气体和火山灰？</div>
      <div class="animation smoke-animation"></div>
      <div class="options">
        <button data-correct="false">
          A. 岩浆太烫，地面中水汽散发
          <div class="steam-line-animation">
            <div class="steam"></div>
            <div class="steam"></div>
            <div class="steam"></div>
          </div>
        </button>
        <button data-correct="false">
          B. 地壳裂缝中的气体逸出
          <div class="crack-steam-animation">
            <div class="block left"></div>
            <div class="block right"></div>
            <div class="crack-steam steam1"></div>
            <div class="crack-steam steam2"></div>
            <div class="crack-steam steam3"></div>
          </div>
        </button>
        <button data-correct="true">
          C. 岩浆中的气体遇压释放
          <div class="lava-steam-animation">
            <div class="lava-base"></div>
            <div class="steam-bubble bubble1"></div>
            <div class="steam-bubble bubble2"></div>
            <div class="steam-bubble bubble3"></div>
          </div>
        </button>
      </div>
    </div>

    <div class="question-block">
      <div class="question-text">2. 为什么板块碰撞会导致火山爆发？</div>
      <div class="options">
        <button data-correct="false">A. 板块互相摩擦产生了能量</button>
        <button data-correct="true">B. 板块下沉使得岩石熔化形成岩浆</button>
        <button data-correct="false">C. 板块互换位置后地心不稳</button>
      </div>
    </div>

    <div class="question-block">
      <div class="question-text">3. 地球上火山最容易出现在哪些地区？</div>
      <div class="options">
        <button data-correct="true">A. 板块边界附近</button>
        <button data-correct="false">B. 沙漠和极地</button>
        <button data-correct="false">C. 高楼林立的城市</button>
      </div>
    </div>

    <div class="question-block">
      <div class="question-text">4. 火山爆发时岩浆会变成什么？</div>
      <div class="options">
        <button data-correct="false">
          A. 黑曜石
          <div class="animation obsidian-animation">
            <div class="obsidian-left"></div>
            <div class="obsidian-right"></div>
            <div class="obsidian-center"></div>
          </div>
        </button>
        <button data-correct="true">B. 火山岩和熔岩流</button>
        <button data-correct="false">C. 化肥</button>
      </div>
    </div>

    <div class="question-block">
      <div class="question-text">5. 为什么有些火山长期不爆发？</div>
      <div class="options">
        <button data-correct="true">A. 岩浆已经冷却凝固</button>
        <button data-correct="false">B. 火山年纪太大</button>
        <button data-correct="false">C. 人类技术封锁</button>
      </div>
    </div>

    <div class="question-block">
      <div class="question-text">6. 火山灰对地球环境有什么影响？</div>
      <div class="options">
        <button data-correct="false">A. 没影响，就是脏点</button>
        <button data-correct="false">B. 会形成大量氧气</button>
        <button data-correct="true">C. 会遮挡阳光，改变气候</button>
      </div>
    </div>

    <div class="question-block">
      <div class="question-text">7. 岩浆上升时会对地表产生什么信号？</div>
      <div class="options">
        <button data-correct="false">A. 地表发光变色</button>
        <button data-correct="true">B. 小型地震频发</button>
        <button data-correct="false">C. 鸟类开始鸣叫</button>
      </div>
    </div>

    <div class="question-block">
      <div class="question-text">8. 最终总结：火山为什么会喷发？</div>
      <div class="options">
        <button data-correct="true" class="volcano-eruption-option">
          A. 地幔岩浆因高温和压力积聚，通过地壳裂缝喷出 
          <div class="eruption-volcano-new">
            <div class="volcano-body-new"></div>
            <div class="lava-top-new"></div>
            <div class="lava-puffs-new">
              <div class="puff-new puff1-new"></div>
              <div class="puff-new puff2-new"></div>
              <div class="puff-new puff3-new"></div>
            </div>
          </div>
        </button>
        <button data-correct="false">B. 周围的相邻板块运动了</button>
        <button data-correct="false">C. 神秘事件的触发完全看运气 <span class="lucky-text">lucky</span></button>
      </div>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
